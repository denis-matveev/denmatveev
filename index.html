<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Denis Matveev | Portfolio</title>
    <meta
      name="description"
      content="Static portfolio homepage for Denis Matveev."
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Climate+Crisis&family=Karla:wght@400;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="site-shell">
      <main class="home-main">
        <section class="hero hero-portfolio">
          <div class="hero-portfolio__inner">
            <div class="hero-logo" aria-hidden="true">
              <div class="hero-logo__mark"></div>
              <div class="hero-logo__portrait">
                <img src="assets/portrait.png" alt="" />
              </div>
            </div>

            <div class="hero-portfolio__copy">
              <h1 class="hero-portfolio__title">
                <span>Denis</span>
                <span>Matveev</span>
              </h1>
              <p class="hero-portfolio__lede">
                Product &amp; UX/UI Designer with 10+ years of experience designing mobile and web
                products. I turn raw ideas and messy prototypes into clear, usable,
                production-ready interfaces.
              </p>
              <div class="actions hero-portfolio__actions">
                <span class="button-link hero-action" aria-disabled="true">
                  <svg viewBox="0 0 24 24" aria-hidden="true">
                    <path
                      d="M14 3H7a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h10a2 2 0 0 0 2-2V8l-5-5Z"
                      fill="none"
                      stroke="currentColor"
                      stroke-linecap="round"
                      stroke-linejoin="round"
                      stroke-width="1.8"
                    />
                    <path
                      d="M14 3v5h5M12 11v6m0 0-3-3m3 3 3-3M9 21h6"
                      fill="none"
                      stroke="currentColor"
                      stroke-linecap="round"
                      stroke-linejoin="round"
                      stroke-width="1.8"
                    />
                  </svg>
                  <span>Resume</span>
                </span>
                <a class="button-link hero-action" href="mailto:denis@example.com">
                  <svg viewBox="0 0 24 24" aria-hidden="true">
                    <path
                      d="M4 7.5A2.5 2.5 0 0 1 6.5 5h11A2.5 2.5 0 0 1 20 7.5v9a2.5 2.5 0 0 1-2.5 2.5h-11A2.5 2.5 0 0 1 4 16.5v-9Z"
                      fill="none"
                      stroke="currentColor"
                      stroke-linecap="round"
                      stroke-linejoin="round"
                      stroke-width="1.8"
                    />
                    <path
                      d="m5 8 7 5 7-5"
                      fill="none"
                      stroke="currentColor"
                      stroke-linecap="round"
                      stroke-linejoin="round"
                      stroke-width="1.8"
                    />
                  </svg>
                  <span>Contact</span>
                </a>
              </div>
            </div>
          </div>
        </section>
      </main>
    </div>
  </body>
</html>
